emailVerificationBodyHtml=<p>Bonjour,</p><p>Afin de sécuriser votre accès à la plateforme FUN, <b>votre adresse e-mail doit être vérifiée</b>.</p><p>Cliquez sur le lien ci-dessous pour confirmer votre adresse :</p><p><a href="{0}">Vérifier mon adresse e-mail</a></p><p><b>Attention : </b>ce lien expirera dans <b>{3}</b>.</p><p>Pour toute question, contactez-nous à <a href="mailto:support@fun-mooc.fr">support@fun-mooc.fr</a>.</p><p>Cordialement,</p><p>L’’équipe FUN</p>
executeActionsBodyHtml=<p>Bonjour,</p><p>Une mise à jour est requise sur votre compte FUN.</p><p>Veuillez effectuer les actions suivantes pour conserver votre accès à la plateforme : {3}</p><p><a href="{0}">Mettre à jour mon compte</a></p><p><b>Attention : </b>ce lien expirera dans {4}.</p><p>Pour toute question, contactez-nous à <a href="mailto:support@fun-mooc.fr">support@fun-mooc.fr</a>.</p><p>Cordialement,</p><p>L’’équipe FUN</p>
passwordResetBodyHtml=<p>Bonjour,</p><p>Une réinitialisation de mot de passe a été demandée pour votre compte FUN.</p><p>Cliquez sur le lien ci-dessous pour définir un nouveau mot de passe :</p><p><a href="{0}">Réinitialiser mon mot de passe</a></p><p><b>Attention : </b>ce lien expirera dans <b>{3}</b>.</p><p>Si vous n’’êtes pas à l’’origine de cette demande, contactez-nous immédiatement à <a href="mailto:support@fun-mooc.fr">support@fun-mooc.fr</a>.</p><p>Cordialement,</p><p>L’’équipe FUN</p>