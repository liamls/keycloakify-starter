emailVerificationBodyHtml=<p>Bonjour,</p><p>Afin de sécuriser votre accès à la plateforme FUN, <b>votre adresse e-mail doit être vérifiée</b>.</p><p>Cliquez sur le lien ci-dessous pour confirmer votre adresse :</p><p><a href="{0}">Vérifier mon adresse e-mail</a></p><p><b>Attention : </b>ce lien expirera dans <b>{3}</b>.</p><p>Pour toute question, contactez-nous à <a href="mailto:contact@fun-mooc.fr">contact@fun-mooc.fr</a>.</p><p>Cordialement,</p><p>L’équipe FUN</p>
executeActionsSubject=Mise à jour de votre compte FUN - Action requise
executeActionsBodyHtml=<p>Bonjour,</p><p>Afin de garantir la sécurité et le bon fonctionnement de votre compte FUN, une mise à jour est nécessaire.</p><p>Nous vous invitons à effectuer les actions suivantes : {3}.</p><p>Vous pouvez réaliser ces étapes en toute sécurité via le lien ci-dessous :</p><p><a href="{0}">Mettre à jour mon compte</a></p><p><b>Attention : </b>ce lien est valable pendant <b>{4}</b>.</p><p>Si vous avez la moindre question, notre équipe reste à votre disposition à l’adresse suivante : <a href="mailto:contact@fun-mooc.fr">contact@fun-mooc.fr</a>.</p><p>Cordialement,</p><p>L’équipe FUN</p>
