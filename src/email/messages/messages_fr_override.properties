passwordResetBodyHtml=<p>Bonjour,</p><p>Une réinitialisation de mot de passe a été demandée pour votre compte FUN.</p><p>Cliquez sur le lien ci-dessous pour définir un nouveau mot de passe :</p><p><a href="{0}">Réinitialiser mon mot de passe</a></p><p><b>Attention : </b>ce lien expirera dans <b>{3}</b>.</p><p>Si vous n’êtes pas à l’origine de cette demande, veuillez ignorer ce message.</p><p>Cordialement,</p><p>L’équipe FUN</p>