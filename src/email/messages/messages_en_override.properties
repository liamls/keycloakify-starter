emailVerificationBodyHtml=<p>Hello,</p><p>To secure your access to the FUN platform, <b>your email address needs to be verified</b>.</p><p>Click the link below to confirm your address:</p><p><a href="{0}">Verify my email address</a></p><p><b>Note: </b>this link will expire in <b>{3}</b>.</p><p>For any questions, contact us at <a href="mailto:support@fun-mooc.fr">support@fun-mooc.fr</a>.</p><p>Best regards,</p><p>The FUN team</p>
executeActionsBodyHtml=<p>Hello,</p><p>An update is required on your FUN account.</p><p>Please complete the following actions to retain access to the platform: {3}</p><p><a href="{0}">Update my account</a></p><p><b>Note: </b>this link will expire in {4}.</p><p>For any questions, contact us at <a href="mailto:support@fun-mooc.fr">support@fun-mooc.fr</a>.</p><p>Best regards,</p><p>The FUN team</p>
passwordResetBodyHtml=<p>Hello,</p><p>A password reset has been requested for your FUN account.</p><p>Click the link below to set a new password:</p><p><a href="{0}">Reset my password</a></p><p><b>Note: </b>this link will expire in <b>{3}</b>.</p><p>If you did not request this, please contact us immediately at <a href="mailto:support@fun-mooc.fr">support@fun-mooc.fr</a>.</p><p>Best regards,</p><p>The FUN team</p>