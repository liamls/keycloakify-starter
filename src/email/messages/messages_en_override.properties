passwordResetBodyHtml=<p>Hello,</p><p>A password reset has been requested for your FUN account.</p><p>Click the link below to set a new password:</p><p><a href="{0}">Reset my password</a></p><p><b>Note: </b>this link will expire in <b>{3}</b>.</p><p>If you did not request this, please ignore this message.</p><p>Best regards,</p><p>The FUN team</p>