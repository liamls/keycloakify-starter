emailVerificationBodyHtml=<p>Hello,</p><p>To secure your access to the FUN platform, <b>your email address needs to be verified</b>.</p><p>Click the link below to confirm your address:</p><p><a href="{0}">Verify my email address</a></p><p><b>Note: </b>this link will expire in <b>{3}</b>.</p><p>For any questions, contact us at <a href="mailto:contact@fun-mooc.fr">contact@fun-mooc.fr</a>.</p><p>Best regards,</p><p>The FUN team</p>
executeActionsSubject=Update your FUN account - Action required
executeActionsBodyHtml=<p>Hello,</p><p>To ensure the security and smooth operation of your FUN account, an update is required.</p><p>We invite you to complete the following actions: {3}.</p><p>You can safely complete these steps via the link below:</p><p><a href="{0}">Update my account</a></p><p><b>Note: </b>for security reasons, this link is valid for <b>{4}</b>.</p><p>If you have any questions, our team is available at: <a href="mailto:contact@fun-mooc.fr">contact@fun-mooc.fr</a>.</p><p>Best regards,</p><p>The FUN team</p>
